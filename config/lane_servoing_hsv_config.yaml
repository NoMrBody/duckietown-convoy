# Lane HSV bounds, tuned from real-camera /sample pixels (2026-06-14):
#   yellow line: H=30 S=182 V=255  (px 17,399)
#   white line:  H=0  S=0   V=255  (px 562,320)
# Yellow is isolated from the low-S floor by S_min, kept above the red stop-line
# hue (lower_h >= ~15) and below green (upper_h <= ~50). White is pure low-S /
# high-V, so its hue is left unconstrained.
white_lower_h: 0
white_lower_s: 0
white_lower_v: 180
white_upper_h: 179
white_upper_s: 60
white_upper_v: 255
yellow_lower_h: 18
yellow_lower_s: 80
yellow_lower_v: 80
yellow_upper_h: 45
yellow_upper_s: 255
yellow_upper_v: 255
