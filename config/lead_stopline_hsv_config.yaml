# HSV bounds for the lead bot's red STOP-LINE detector (separate from the old
# LED HSV: tape is usually less saturated / brighter than an LED). Red wraps
# hue=0 in OpenCV's H=[0,180] space, so two ranges are OR'd together.
# Tune on the real floor under the venue lighting.
red_low_h_min:  0
red_low_h_max:  12
red_high_h_min: 165
red_high_h_max: 180
s_min: 90
s_max: 255
v_min: 80
v_max: 255
