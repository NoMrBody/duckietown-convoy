# ============================================================================
# FOLLOWER bot config (project_follow). Pure pursuit of the lead's circle-grid
# back marker + lane fallback. No traffic-sign logic. Distance values are in the
# circle-grid mean-dot-spacing proxy (px) and MUST be field-tuned from real
# footage (read the printed "span=...px" at known gaps).
# ============================================================================

cruise_speed: 0.30

# --- follow distance taper (FIELD-TUNE: grid mean dot spacing in px) ---
grid_safe_px:  20      # span <= this  => far  => full cruise speed
grid_stop_px:  42      # span >= this  => close => zero speed (implicit stop)
grid_close_px: 36      # lost while span >= this => CLOSE_STOP (don't coast into the lead)
grid_arm_px:   40      # only start following once a gap this large (span <= this) has opened
grid_min_score: 0.5

# --- pursuit steering ---
leader_p_gain: 0.6
max_steer:     0.4

# --- corner recovery when the leader is lost in a turn ---
corner_mode: lane             # "lane": remember which way the leader turned and keep
                              #   lane-following (biased toward it) until re-seen — robust
                              #   on the real bot (no pose odometry). "turn": legacy
                              #   open-loop ~90deg dead-reckoned arc (sim only).
corner_commit_s:   3.0        # bias the lane steering toward the remembered corner this long
corner_steer_bias: 0.12       # how hard to nudge toward the corner (added to lane steering,
                              #   clamped to +/- max_steer and to the base speed)

# --- sim-only pose bridge (Godot gives the leader's true pose; real robot does
#     NOT, so this auto-disables there and the lane fallback above is used) ---
# While the marker is lost, follow the leader's true position. Vision cannot
# infer a sharp perpendicular intersection turn (marker centered until it
# vanishes, follower's lane runs straight on), so lane mode diverges there.
# Behaviour: when the leader swings clearly to one side it has turned a corner
# -> COMMIT to a decisive arc that way until roughly facing it again; when the
# leader is ~ahead, gentle gap-tapered approach. Hands back to vision FOLLOW the
# moment the grid re-detects.
pose_pursuit:        true     # set false to force the pure-vision path even in sim
pose_p_gain:         1.0      # (ahead mode) steer per rad of bearing error (+bearing=left => +steer)
pose_deadband_rad:   0.05     # (ahead mode) ignore tiny bearing error (anti-hunt near dead-ahead)
pose_behind_rad:     2.6      # |bearing| past this (~150deg) => leader is behind: HOLD, never pivot/reverse
pose_stop_m:         0.45     # (ahead mode) gap taper: stop closer than this (never ram; let it separate
pose_safe_m:         1.00     #   into marker range), full pursuit speed past pose_safe_m
pose_pursuit_speed:  0.30     # (ahead mode) forward pace closing on a leader dead ahead
# committed corner turn (the leader rounded a corner -> just turn that way):
pose_turn_enter_rad: 0.45     # commit a turn once |bearing| exceeds this (~26deg off-axis)
pose_turn_exit_rad:  0.20     # release the commit once back within this of facing the leader (~11deg)
pose_turn_steer:     0.22     # arc steer during the committed turn (sign = leader's side)
pose_turn_speed:     0.26     # forward pace during the committed turn (decisive, never stalls)

# --- lost handling ---
leader_lost_grace_s:    0.4   # window after the grid drops before handing off to lane pursuit
pursuit_timeout_s:      25.0  # pursue this long after the last sighting before HOLD
                              # (tight curves flicker lane health; don't park mid-corner)
pursuit_speed:          0.11  # blind lane speed while the leader was seen recently. Keep it at
                              # or just BELOW the leader's pace: a blind follower driving FASTER
                              # than the leader overruns into point-blank range, where the big
                              # circle-grid board overflows the frame and can NOT be re-detected
                              # (findCirclesGrid needs the whole lattice) — so it stays blind and
                              # diverges. At/below the leader's pace the gap holds in detection
                              # range and the marker re-acquires. (Sim leader ~0.12 m/s; was 0.17
                              # = 40% too fast and rammed the leader's bumper.)
reacquire_creep_speed:  0.12  # slow creep while reacquiring into a corner
reacquire_steer_gain:   0.8   # steer toward the last-seen marker bearing
reacquire_heading_gain: 0.0   # best-effort tilt feed-forward; off by default (no intrinsics)

# --- pursuit turn: mimic the leader's corner instead of cutting toward it ---
turn_lateral_min:       0.18  # marker swept this far off-center at the loss => the leader turned
turn_heading_min:       0.06  # |perspective heading| in the last sightings => the leader turned
                              # (FOLLOW keeps the marker centered, so lateral rarely fires)
turn_lane_steer_min:    0.06  # |lane steering| while following => infer corner from the lane
                              # curve when the marker stays centered (real-bot default path)
turn_use_heading:       false # the perspective heading cue is noisy/unreliable on the real bot
                              # (it made the follower rotate the wrong way on slight turns) =>
                              # ignore it and rely on the lateral-sweep cue, which keeps a
                              # consistent sign. A slight turn then just keeps lane-following.
turn_heading_sign:      -1.0  # only used when turn_use_heading is true: maps the producer's
                              # heading sign onto this camera (producer: +heading = leader right).
                              # Flip this and set turn_use_heading: true once validated on hardware.
span_to_dist_k:         13.5  # camera-to-board distance from span: d = k / span_px
                              # (k = focal_px * dot spacing; Godot fov 75 deg is VERTICAL ->
                              #  f = 240/tan(37.5) = 313 px, * 0.042 m — FIELD-TUNE for real)
turn_approach_margin_m: -0.10 # offset from the marker's vanish point (+ = stop short,
                              # - = overshoot). The board trails the leader's body, so the
                              # corner itself is ~a body-length PAST where the board vanished
pursuit_turn_speed:     0.15  # forward speed during approach + turn
pursuit_turn_steer:     0.06  # turn-arc steer (+ = left). Sets the arc RADIUS:
                              # r = speed*baseline/(2*steer*max_wheel_speed). 0.06 in sim
                              # (1 m/s wheels) ~ the 0.17 m corner arc — FIELD-TUNE for real
turn_yaw_target_rad:    1.5   # ~86 deg; the closed-loop turn is accurate, come out square
max_pursuit_turn_s:     4.0   # hard timeout on the turn phase (no-odometry fallback)
post_turn_settle_s:     3.0   # hold still after the turn so the tailgated leader pulls
                              # away into detection range (grid must FIT in the frame)

# --- lane fallback ---
# Align with lane_servoing_config detection_threshold (100): the FSM only
# needs enough pixels for the lane agent to steer, not a huge mask.
lane_healthy_min_pixels: 150

# --- chain signal ---
rear_led_indices: [3, 4]   # lit red while following, for any further follower

# --- circle-grid tracker (cv2.findCirclesGrid) ---
grid_cols: 7
grid_rows: 3
grid_downscale: 0.5          # downscale gray before detection (perf)
grid_roi_pad_px: 60          # padding around last hit for the ROI search
grid_roi_downscale: 1.0      # the ROI is small -> search it at full res (~2x range)
grid_far_search: true        # when lost, also scan a full-res horizon band so a
grid_far_band_top_frac: 0.10 #   distant leader (~3 m) is re-found after corners
grid_far_band_bot_frac: 0.45
grid_lost_grace_frames: 6    # tracker-level reuse of last estimate on a miss
grid_use_clustering: false   # CALIB_CB_CLUSTERING: better at steep angles, worse w/ clutter
grid_blob_min_area: 10       # SimpleBlobDetector dot-area bounds (FIELD-TUNE)
grid_blob_max_area: 8000
grid_blob_min_circularity: 0.6
