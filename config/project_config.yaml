# Cruise + state speeds
cruise_speed: 0.3
slow_factor:  0.5

# Sign state durations and cooldowns (seconds)
stop_duration:  1.0
slow_duration:  1.5
stop_cooldown:  3.0
slow_cooldown:  3.0

# Leader following (distance proxy = bbox height in pixels)
safe_distance_px:     60     # bbox this small => cruise full speed
stop_distance_px:    180     # bbox this big  => zero speed
leader_lost_grace_s:  0.25   # keep FOLLOW state for this long after a missed detection
leader_p_gain:        0.6    # used only when steering from leader bbox
max_steer:            0.4

# Perception
lane_healthy_min_pixels: 500   # below this, fall back to leader-bbox steering
leader_lower_half_only:  true  # ignore truck detections in the upper half of the frame
detection_cache_ttl:     5     # frames to reuse last detection list during inference skips

# AprilTag traffic signs (Duckietown standard). Detected via cv2.aruco.
# Find your signs' tag IDs by running the task and reading the "tags=[...]"
# value the agent prints, then list the relevant IDs below.
apriltag_family:    tag36h11   # tag36h11 | tag36h10 | tag25h9 | tag16h5
apriltag_stop_ids:  []         # tag IDs that mean STOP
apriltag_slow_ids:  []         # tag IDs that mean SLOW
apriltag_min_area_px: 0        # ignore tags smaller than this (px²); 0 = any size

# LED-based leader detection (lead bot's two steady-on red rear LEDs)
led_min_area_px:         4
led_max_area_px:         400
led_y_tol_px:            15
led_min_sep_px:          10
led_max_sep_px:          200
led_roi_top_frac:        0.30
led_roi_bot_frac:        0.95
led_track_radius_px:     60     # ROI radius for next-frame search around last midpoint
led_lost_grace_frames:   5      # frames to reuse last estimate after a miss
led_pair_px_max_jump:    25     # reject pairs whose pair_px jumps more than this between frames
led_min_score:           0.4    # gate for entering FOLLOW from an LED-only fix

# Range proxy from inter-LED pixel distance (used when source is led/fused)
led_safe_pair_px:        20     # pair_px this small => cruise full speed
led_stop_pair_px:        110    # pair_px this big  => zero speed

# Fusion: LED midpoint and YOLO bbox center must agree within this
# fraction of frame width to call the fix "fused".
led_yolo_agree_frac:     0.15

# Rear LED indices to colour red while in FOLLOW (Duckiebot layout varies).
rear_led_indices:        [3, 4]
